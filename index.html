                padding-right: 0px;
                overflow: auto;

                vertical-align: middle;
                color: yellow;
                font-size: 40px;
                vertical-align: middle;
                font-family: "Sigmar";
                font-weight: 400;
                margin-right: 50px;
            }

                height: 300px;
                width: 400px;
                margin-right: 40px;
                margin-top: 20px;
                margin-bottom: 23px;
                margin-left: 5px;

                height: 100vh;

                overflow: hidden;
                text-decoration: underline;

                color: lightgray;

            #sidebar-nav li:hover, #sidebar-nav li.selected {

    <body>
        <div id="wrapper">
            <aside id="sidebar">
                <img id="logo" src="https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/images/icons/logo.png">
                <div id="sidebar-nav">
                    <li class="selected" id="nav-all">All Games</li>
                    <li id="nav-high-quality">High Quality</li>
                    <li id="nav-horror">Horror</li>
                    <li id="nav-endless">Endless</li>
                    <li id="nav-multiplayer">Multiplayer</li>
                    <li id="nav-other">Other</li>
                    <li id="nav-duck-life">Duck Life</li>
                    <li id="nav-suggest-games">Suggest Games</li>
                </ul>
            </aside>
            <ul id="games-list"></ul>
            <iframe id="suggestion-form" src="https://docs.google.com/forms/d/e/1FAIpQLSfKJVwz6ID4h4FsSEM0iTtlCqYPh6vZzWUlptiZmZAgRt0xkg/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
            <!-- <a style="font-family: 'Merriweather Sans'; font-size: 32px; font-weight: 400; color: white; margin: 15px 0px;"href="https://docs.google.com/forms/d/e/1FAIpQLSfKJVwz6ID4h4FsSEM0iTtlCqYPh6vZzWUlptiZmZAgRt0xkg/viewform">Suggest Games</a> -->
            <script>
                const gamesIdList = Object.keys(GAMES);
                const gamesListElement = document.getElementById("games-list");
                for (let i=0; i<gamesIdList.length; i++) {
                    let gameId = gamesIdList[i];
                    let gameElement = document.createElement("li");
                    gameElement.id = gameId;
                    let gameInfo = GAMES[gameId];
                    gameElement.innerHTML = `
                        <img src="https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/images/games/${gameInfo.image}">
                        <a href="${gameInfo.url[CONTEXT]}">${gameInfo.name}</a>
                    `
                    gamesListElement.appendChild(gameElement);
                }
            </script>
            <script>
                var currentTab = "all";
                var navButtons = document.getElementById("sidebar-nav").children;
                for (let i=0; i<navButtons.length; i++) {
                    let navButton = navButtons[i];
                    navButton.addEventListener("click", () => {
                        document.getElementById("nav-" + currentTab).classList.remove("selected");
                        navButton.classList.add("selected");
                        currentTab = navButton.id.slice(4);
                        updateList();
                    })
                }

                function updateList() {
                    if (currentTab != "suggest-games") {
                        let gamesList = document.getElementById("games-list");
                        gamesList.style.display = "block";
                        document.getElementById("suggestion-form").style.display = "none";
                        let gameItems = gamesList.children;
                        if (currentTab == "all") {
                            for (let i=0; i<gameItems.length; i++) {
                                gameItems[i].style.display = "flex";
                            }
                        } else {
                            for (let i=0; i<gameItems.length; i++) {
                                let gameItem = gameItems[i];
                                if (GAMES[gameItem.id].categories.includes(currentTab)) {
                                    gameItem.style.display = "flex";
                                } else {
                                    gameItem.style.display = "none";
                                }
                            }
                        }
                    } else {
                        document.getElementById("games-list").style.display = "none";
                        document.getElementById("suggestion-form").style.display = "block";
                    }
                }
            </script>
        </div>
