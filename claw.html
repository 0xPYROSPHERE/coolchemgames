<!DOCTYPE html>
<html>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sigmar&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #36344e;
            margin: 0px;
        }

        #game {
            height: 500px;
            width: 100vw;
            background-color: gray;
            text-align: center;
        }

        #game iframe {
            margin: 0px;
            border: 0px;
            height: 500px;
            width: 50vw;
        }

        #game select, #game input::file-selector-button {
            display: inline;
            margin: 0px 25px;
        }

        #wrapper {
            display: block;
            padding: 60px 0px;
            font-family: "Merriweather Sans";
            font-size: 36px;
            text-align: center;
            line-height: 1.8;
        }

        #wrapper button {
            margin: 0px 30px;
        }

        #rom-select, #system-select {
            font-family: "Merriweather Sans";
            font-size: 30px;
            text-align: center;
        }

        #rom-file {
            font-family: "Merriweather Sans";
            font-size: 36px;
            width: 500px;
        }

        #rom-file::file-selector-button {
            font-family: "Merriweather Sans";
            font-size: 30px;
        }

        #game img {
            height: 100px;
            width: 100px;
        }

        h1 {
            text-align: center;
            font-size: 60px;
            color: yellow;
            font-family: 'Sigmar';
            font-weight: 400;
        }

        body, html {
            margin:0;
            padding:0;
            height:100%;
            width:100%;
            overflow:hidden;
        }

        #ejs-game {
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            border:none;
        }
    </style>
    <script>
                    function beginLoading() {
                //const gameWindow = window.open("", "_blank");
                loaderScript = document.createElement("script");
                loaderScript.src = "https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/emulatorjs/data/4.2.3/loader.js";
                gameDiv = document.createElement("div");
                gameDiv.id = "ejs-game";
                document.body.replaceChildren(gameDiv, loaderScript);
                console.log(document.body.innerHTML);
                //gameWindow.document.write(gameHtml);
               // gameWindow.document.body.append(loaderScript);
            }
    </script>
    <body>
        <div id="game">
            <div id="wrapper">
                <select name="ROM" id="rom-select">
                    <option disabled selected value>Select Game</option>
                    <option disabled>--- Call of Duty ---</option>
                    <option value="af">Call of Duty: Modern Warfare (DS)</option>
                    <option value="ag">Call of Duty: Modern Warfare 2 (DS)</option>
                    <option value="ad">Call of Duty: Modern Warfare 3 (DS)</option>
                    <option value="ah">Call of Duty: World at War (DS)</option>
                    <option value="aa">Call of Duty: Black Ops (DS)</option>
                </select>
                or
                <input type="file" id="rom-file">
                <br>
                <select name="System" id="system-select" style="display: none;">
                    <option disabled selected value>Select system</option>
                    <option value="psx">Playstation</option>
                    <option value="jaguar">Atari Jaguar</option>
                    <option value="snes">SNES</option>
                    <option value="n64">Nintendo 64</option>
                    <option value="nes">NES</option>
                    <option value="lynx">Atari Lynx</option>
                    <option value="segaSaturn">Sega Saturn</option>
                    <option value="segaMS">Master System</option>
                    <option value="segaMD">Sega Genesis</option>
                    <option value="atari2600">Atari 2600</option>
                    <option value="gb">Game Boy</option>
                    <option value="gba">Game Boy Advance</option>
                    <option value="nds">Nintendo DS</option>
                    <option value="pce">TurboGrafx-16</option>
                    <option value="c64">Commodore 64</option> 
                </select>
                <div style="display: none;" id="build-load-text">Building ROM...</div>
            </div>
        </div>
                <script>
                    const baseUrl = "https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/";
                    window.EJS_pathtodata = "https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/emulatorjs/4.2.3/data";
            ROM_EXTS = {
                "sfc": "snes",
                "smc": "snes",
                "7z": "generic",
                "zip": "generic",
                "n64": "n64",
                "z64": "n64",
                "v64": "n64",
                "nes": "nes",
                "j64": "jaguar",
                "jag": "jaguar",
                "bin": "generic",
                "iso": "generic",
                "lnx": "lynx",
                "sms": "segaMS",
                "md": "segaMD",
                "a26": "atari2600",
                "gb": "gb",
                "gba": "gba",
                "nds": "nds",
                "pce": "pce",
                "d64": "c64",
                "g64": "c64",
                "t64": "c64",
                "chd": "generic",
                "": "generic"
            }

            window.EJS_gameUrl = "";
            window.EJS_core = "";
            window.EJS_startOnLoaded = true;
            window.EJS_player = "#ejs-game";
            window.EJS_color = "#0064ff";
            romFile = document.getElementById("rom-file");
            romFile.addEventListener("input", () => {
                fileReader = new FileReader();
                fileReader.readAsDataURL(romFile.files[0]);
                fileReader.addEventListener("load", () => {
                    window.EJS_gameUrl = fileReader.result;
                    loadEmulator(romFile.files[0].name);
                })
            })

            function createPlayButton() {
                const playButton = document.createElement("button");
                const playIcon = document.createElement('img');
                playIcon.src = "https://cdn.jsdelivr.net/gh/0xPYROSPHERE/coolchemgames@main/images/icons/fsbutton.png";
                playButton.append(playIcon);
                document.getElementById("wrapper").append(playButton);
                playButton.addEventListener("click", () => {beginLoading();})
            }

            function loadEmulator(romName) {
                console.log(window.EJS_gameUrl);
                console.log(window.EJS_core);
                if (romName.includes(".")) {
                    romExtension = romName.slice(romName.indexOf(".") + 1, romName.length);
                    window.EJS_gameName = romName.slice(0, romName.indexOf("."));
                } else {
                    window.EJS_gameName = romName;
                    romExtension = "";
                }
                if (ROM_EXTS[romExtension] != "generic") {
                    window.EJS_core = ROM_EXTS[romExtension];                        
                    createPlayButton();
                } else if (window.EJS_core == "") {
                    document.getElementById("system-select").style.display = "inline";
                    document.getElementById("system-select").addEventListener("change", () => {
                        window.EJS_core = document.getElementById("system-select").value;
                        createPlayButton();
                    })
                } else {
                    createPlayButton();
                }

            }

            const romSelect = document.getElementById("rom-select");

            romSelect.addEventListener("change", () => {
                const romId = romSelect.value;
                fetch(baseUrl + "claw/index.json?v=2")
                    .then((response) => {return response.json();})
                    .then((data) => {
                            buildRom(data[romId]);
                        })
            })

            async function buildRom(romData) {
                var loadingText = document.getElementById("build-load-text");
                loadingText.style.display = "inline";
                var romChunks = new Uint8Array();
                for (let i=0; i<romData.chunks; i++) {
                    await fetch(`${baseUrl}claw/${romSelect.value}/${romSelect.value}.zip.${i}?v=1`)
                        .then((response) => {return response.bytes();})
                        .then((chunkBytes) => {
                            let romChunksExtend = new Uint8Array(romChunks.length + chunkBytes.length);
                            romChunksExtend.set(romChunks, 0);
                            romChunksExtend.set(chunkBytes, romChunks.length);
                            romChunks = romChunksExtend;  
                        })
                }                  
                loadingText.style.display = "none";
                window.EJS_gameUrl = new Blob([romChunks])
                window.EJS_core = romData.system;
                loadEmulator(romData.title);
            }


        </script>
    </body>
</html>
